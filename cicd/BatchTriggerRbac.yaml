# ClusterRole: batch namespaceмқҳ Job/CronJob мЎ°мһ‘ к¶Ңн•ң
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: batch-trigger-role
rules:
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["create", "get", "list"]
---
# ClusterRoleBinding: default namespaceмқҳ default SAм—җ ClusterRole л¶Җм—¬
# (л°ұм—”л“ң Podк°Җ batch namespaceмқҳ Jobмқ„ мғқм„ұн•  мҲҳ мһҲлҸ„лЎқ cross-namespace н—Ҳмҡ©)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: batch-trigger-binding
subjects:
  - kind: ServiceAccount
    name: default
    namespace: default
roleRef:
  kind: ClusterRole
  name: batch-trigger-role
  apiGroup: rbac.authorization.k8s.io
