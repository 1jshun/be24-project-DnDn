apiVersion: apps/v1
kind: Deployment
metadata:
  name: dndn-gateway
  labels:
    app: dndn-gateway
    type: gateway
    version: stable
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dndn-gateway
      type: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: dndn-gateway
        type: gateway
        version: stable
    spec:
      containers:
        - name: gateway
          image: seungwoo0128/dndn-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8088
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8088
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: EUREKA_DEFAULT_ZONE
              value: "http://discovery-service:8761/eureka/"
          envFrom:
            - configMapRef:
                name: backend-config
            - configMapRef:
                name: gateway-config
