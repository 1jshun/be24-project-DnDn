openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-5.5

# springdoc, server.forward-headers-strategy 는 application.yml(기본)에 위치
# → 어떤 프로파일이 활성화되어도 항상 적용됨

spring:
  application:
    name: dndn

  data:
    redis:
      password: ${REDIS_PASSWORD}
      sentinel:
        master: ${REDIS_SENTINEL_MASTER}
        nodes: ${REDIS_SENTINEL_NODES}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      max-lifetime: 600000
      keepalive-time: 60000
      connection-timeout: 30000
      idle-timeout: 300000
      data-source-properties:
        rewriteBatchedStatements: "true"

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_batch_fetch_size: 1000
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

# K8s Deployment env DEPLOYMENT_COLOR → /api/actuator/info 의 deployment.color JSON
info:
  deployment:
    color: ${DEPLOYMENT_COLOR:unknown}

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  info:
    env:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
    org.example: info
    net.ttddyy.observation: warn
    org.springframework.kafka: warn
    org.apache.kafka: warn
    org.apache.kafka.clients.NetworkClient: error
    org.apache.kafka.clients.producer.internals.Sender: error

weather:
  kma:
    service-key: ${KMA_SERVICE_KEY}
    village-url: https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst
    mid-land-url: http://apis.data.go.kr/1360000/MidFcstInfoService/getMidLandFcst
    mid-temp-url: http://apis.data.go.kr/1360000/MidFcstInfoService/getMidTa
    warning-url: http://apis.data.go.kr/1360000/WthrWrnInfoService/getWthrWrnMsg
    asos-url: http://apis.data.go.kr/1360000/AsosDalyInfoService/getWthrDataList
    nx: 60
    ny: 127
    mid-land-reg-id: 11B00000
    mid-temp-reg-id: 11B10101
    stn-id: 108
    location-label: 서울 현장

  air-korea:
    service-key: ${AIRKOREA_SERVICE_KEY}
    sido-url: http://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getCtprvnRltmMesureDnsty
    sido-name: 서울

  scheduler:
    enabled: true
    cron: "10 0 * * * *"
    warmup-on-startup: true
    startup-past-days: 15
    startup-future-days: 15
    refresh-future-days: 15

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}


cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region: ap-northeast-2
    s3:
      bucket: ${AWS_BUCKET_NAME}
      presigned-url-expiration: 600

storage:
  type: s3   # 기본값: s3 (운영). 부하테스트할 때만 local로 변경
  local:
    base-url: http://localhost:8080   # 로컬 다운로드 엔드포인트의 base URL

file:
  upload-dir: ./uploads

document:
  kafka:
    topics:
      document-uploaded: ${DOCUMENT_UPLOADED_TOPIC:document.uploaded.v1}
      work-order-changed: ${WORK_ORDER_CHANGED_TOPIC:work-order.changed.v1}
      daily-report-changed: ${DAILY_REPORT_CHANGED_TOPIC:daily-report.changed.v1}