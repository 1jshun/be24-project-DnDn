spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

# ──────────────────────────────────────────────────
# springdoc 설정은 어떤 프로파일에서도 동작해야 하므로
# application.yml(기본)에 위치시킴
# ──────────────────────────────────────────────────
server:
  forward-headers-strategy: framework   # Nginx proxy 뒤에서 https 스킴/호스트 정보 복원

springdoc:
  api-docs:
    path: /v3/api-docs                   # Nginx rewrite-target:/$2 가 /api 를 strip → Spring Boot는 /v3/api-docs 수신
  swagger-ui:
    # config-url: 브라우저가 /api/ 포함해서 요청 → Nginx strip → Spring Boot /v3/api-docs/swagger-config 수신
    config-url: /api/v3/api-docs/swagger-config
    urls:
      - name: dndn-core
        url: /api/v3/api-docs            # 브라우저 /api/ prefix → Nginx strip → Spring Boot /v3/api-docs
      - name: document-management
        url: /api/msa/document-management/v3/api-docs
    urls-primary-name: dndn-core

dndn:
  seed:
    load-test:
      enabled: ${DNDN_SEED_LOAD_TEST_ENABLED:false}
      site-count: ${DNDN_SEED_LOAD_TEST_SITE_COUNT:20}
      daily-reports-per-site: ${DNDN_SEED_LOAD_TEST_DAILY_REPORTS_PER_SITE:2500}
      work-orders-per-site: ${DNDN_SEED_LOAD_TEST_WORK_ORDERS_PER_SITE:2500}