server:
  port: ${DISCOVERY_PORT:8761}

eureka:
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    status-page-url: http://${EUREKA_INSTANCE_HOSTNAME:localhost}:${DISCOVERY_PORT:8761}/actuator/info
    health-check-url: http://${EUREKA_INSTANCE_HOSTNAME:localhost}:${DISCOVERY_PORT:8761}/actuator/health
    home-page-url: http://${EUREKA_INSTANCE_HOSTNAME:localhost}:${DISCOVERY_PORT:8761}/

  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/%7D

  server:
    enable-self-preservation: false
